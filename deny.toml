[graph]
all-features = true

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "deny"
ignore = [
    # pgrx 0.19.1 depends on serde_cbor for extension metadata serialization.
    # The advisory is unmaintained-only, cargo audit reports it as a warning, and
    # there is no safe direct upgrade while pgContext is pinned to this pgrx line.
    "RUSTSEC-2021-0127",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
